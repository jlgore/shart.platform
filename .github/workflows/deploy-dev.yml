name: Deploy to Development

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy-platform:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Lockfile sync guard (npm ci)
        run: |
          npm ci
          echo "Lockfile and package manifest are in sync."

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Deploy to Cloudflare Workers (Dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Successfully deployed to development environment (shart-platform-dev)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to development failed"
          exit 1

  deploy-lab-worker:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy lab worker to Cloudflare (Dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: lab-worker
          command: deploy --env dev
