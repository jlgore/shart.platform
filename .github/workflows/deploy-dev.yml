name: Deploy to Development

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # ── Platform API (deploy first — frontend has a service binding to it) ───
      - name: Install platform-api dependencies
        run: npm ci
        working-directory: platform-api

      - name: Deploy platform-api (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform-api
          command: deploy --env dev

      # ── Lab Worker ───────────────────────────────────────────────────────────
      - name: Install lab-worker dependencies
        run: npm ci
        working-directory: lab-worker

      - name: Deploy lab-worker (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: lab-worker
          command: deploy --env dev

      # ── Frontend (last — depends on platform-api service binding) ────────────
      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Deploy frontend (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev

      - name: Notify deployment success
        if: success()
        run: echo "✅ Successfully deployed all services to development"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to development failed"
          exit 1
