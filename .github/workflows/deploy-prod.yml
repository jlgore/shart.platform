name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Deploy frontend (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env prod

      # ── Platform API ─────────────────────────────────────────────────────────
      - name: Install platform-api dependencies
        run: npm ci
        working-directory: platform-api

      - name: Deploy platform-api (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform-api
          command: deploy

      # ── Lab Worker ───────────────────────────────────────────────────────────
      - name: Install lab-worker dependencies
        run: npm ci
        working-directory: lab-worker

      - name: Deploy lab-worker (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: lab-worker
          command: deploy

      - name: Notify deployment success
        if: success()
        run: echo "✅ Successfully deployed all services to production at https://shart.cloud"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to production failed"
          exit 1
