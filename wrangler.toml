[env.prod]
name = "shart-platform-prod"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-03-25"
compatibility_flags = [ "nodejs_compat" ]

routes = [
  { pattern = "shart.cloud/*", zone_name = "shart.cloud" },
  { pattern = "www.shart.cloud/*", zone_name = "shart.cloud" }
]

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

# Development environment
[env.dev]
name = "shart-platform-dev"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-03-25"
compatibility_flags = [ "nodejs_compat" ]
[[env.dev.routes]]
pattern = "dev.shart.cloud"
custom_domain = true
