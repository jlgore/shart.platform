      <path d="M10 14 L10 10 A6 6 0 0 1 22 10 L22 14"/>
      <circle cx="16" cy="22" r="2.5" fill="white"/>
    </svg>
    <text x="27" y="56" font-family="'Pixelify Sans', Tahoma, sans-serif" font-size="10" fill="white" text-anchor="middle">CTF</text>
  </g>

  <g transform="translate(12, 264)">
    <svg x="8" y="8" width="38" height="38" viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2">
      <path d="M27 16 A11 11 0 1 1 16 5"/>
      <polyline points="16,1 16,7 22,7" stroke-linejoin="round"/>
    </svg>
    <text x="27" y="56" font-family="'Pixelify Sans', Tahoma, sans-serif" font-size="10" fill="white" text-anchor="middle">Games</text>
  </g>

  <g transform="translate(12, 346)">
    <svg x="8" y="8" width="38" height="38" viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round">
