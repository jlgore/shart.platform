<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Win95 teal desktop dot grid -->
    <pattern id="dotgrid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#008080"/>
      <circle cx="0" cy="0" r="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>

    <!-- Titlebar gradient: #000080 → #1084d0 -->
    <linearGradient id="titlebar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="100%" stop-color="#1084d0"/>
    </linearGradient>

    <!-- Titlebar subtle banding overlay -->
    <pattern id="titlebar-band" x="0" y="0" width="1" height="2" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="transparent"/>
      <rect y="1" width="1" height="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>

    <!-- Clipping for window body -->
    <clipPath id="body-clip">
      <rect x="92" y="52" width="1084" height="540"/>
    </clipPath>
  </defs>

  <!-- ── Desktop background ───────────────────────────── -->
  <rect width="1200" height="630" fill="url(#dotgrid)"/>

  <!-- ── Desktop icons (left column) ─────────────────── -->
  <!-- Icon: Courses -->
  <g transform="translate(12, 18)">
    <svg x="8" y="8" width="38" height="38" viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round">
      <rect x="2" y="10" width="28" height="18"/>
      <polyline points="2,10 16,3 30,10"/>
      <line x1="16" y1="3" x2="16" y2="10"/>
      <line x1="2" y1="16" x2="30" y2="16"/>
    </svg>
    <text x="27" y="56" font-family="'Pixelify Sans', Tahoma, sans-serif" font-size="10" fill="white" text-anchor="middle">Courses</text>
  </g>

  <g transform="translate(12, 100)">
    <svg x="8" y="8" width="38" height="38" viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round">
      <path d="M2 10 L2 28 L30 28 L30 10 Z"/>
      <path d="M2 10 L11 4 L19 4 L19 10"/>
    </svg>
    <text x="27" y="56" font-family="'Pixelify Sans', Tahoma, sans-serif" font-size="10" fill="white" text-anchor="middle">Labs</text>
  </g>

  <g transform="translate(12, 182)">
    <svg x="8" y="8" width="38" height="38" viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round">
