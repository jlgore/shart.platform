  <rect x="88" y="52" width="1084" height="468" fill="#c0c0c0"/>

  <!-- ── Badge row ──────────────────────────────────────── -->
  <!-- Category badge (navy) — replaced by buildOgSvg overlay -->
  <!-- Label badge (green) — replaced by buildOgSvg overlay -->

