name = "shart-platform-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain for the API
routes = [
  { pattern = "platform.shart.cloud/*", zone_name = "shart.cloud" }
]

# D1 Database binding (matches root wrangler.toml for local dev)
[[d1_databases]]
binding = "DB"
database_name = "shart-ctf-db"
database_id = "786fbd4c-fefe-49ba-b64f-0d345d8bac1b"

[vars]
# Non-sensitive config
ENVIRONMENT = "production"
AUTH_FROM_EMAIL = "SHART Cloud <onboarding@resend.dev>"

[observability]
enabled = true

# ============================================================================
# Development
# ============================================================================
[env.dev]
name = "shart-platform-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "shart-ctf-db-dev"
database_id = "5b4238d6-1fdb-4716-bea7-29d3278f5b40"

[env.dev.vars]
ENVIRONMENT = "development"
AUTH_FROM_EMAIL = "SHART Cloud <onboarding@resend.dev>"
